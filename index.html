    <!-- No-flash theme: set data-theme BEFORE first paint.
         Light is the deliberate default (the showcase). Dark is opt-in and is
         only used when the visitor has explicitly chosen and we stored it. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          document.documentElement.setAttribute("data-theme", t === "dark" ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <!-- ⌘K command palette -->
    <div id="palette" class="palette" role="dialog" aria-modal="true" aria-label="Command palette" hidden>

            type="text"
            autocomplete="off"
            autocapitalize="off"

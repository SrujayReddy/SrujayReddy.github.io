<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Path Finder — shortest campus walking path via Dijkstra's algorithm">
  <defs>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="wash" cx="0.8" cy="0.1" r="1">
      <stop offset="0" stop-color="#e6e9ff"/>
      <stop offset="1" stop-color="#eef1f8"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="640" height="360" fill="url(#wash)"/>

  <!-- street grid (faint) -->
  <g stroke="#0b0d12" stroke-opacity="0.07" stroke-width="10" fill="none" stroke-linecap="round">
    <path d="M-20 84 H660"/>
    <path d="M-20 182 H660"/>
    <path d="M-20 286 H660"/>
    <path d="M96 -20 V380"/>
    <path d="M236 -20 V380"/>
    <path d="M392 -20 V380"/>
    <path d="M540 -20 V380"/>
  </g>
  <!-- lake shore (top-right, a nod to Mendota) -->
  <path d="M470 -20 C 500 40, 590 60, 660 52 L660 -20 Z" fill="#22d3ee" fill-opacity="0.10"/>

  <!-- explored edges (Dijkstra frontier) -->
  <g stroke="#0b0d12" stroke-opacity="0.16" stroke-width="2.5" stroke-dasharray="1 7" stroke-linecap="round" fill="none">
    <path d="M96 286 L236 286"/>
    <path d="M96 182 L96 84"/>
    <path d="M236 182 L236 84 L392 84"/>
    <path d="M392 182 L540 182 L540 84"/>
    <path d="M236 286 L392 286 L392 182"/>
  </g>

  <!-- shortest path -->
  <path d="M96 286 L96 182 L236 182 L392 182 L392 84 L540 84"
        fill="none" stroke="url(#path)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- graph nodes -->
  <g fill="#ffffff" stroke="#3b4152" stroke-width="2.5">
    <circle cx="236" cy="84" r="7"/>
    <circle cx="392" cy="286" r="7"/>
    <circle cx="540" cy="182" r="7"/>
    <circle cx="236" cy="286" r="7"/>
    <circle cx="96" cy="84" r="7"/>
  </g>
  <!-- path nodes -->
  <g fill="#ffffff" stroke="#7c3aed" stroke-width="3">
    <circle cx="96" cy="182" r="8"/>
    <circle cx="236" cy="182" r="8"/>
    <circle cx="392" cy="182" r="8"/>
    <circle cx="392" cy="84" r="8"/>
  </g>

  <!-- start pin -->
  <g>
    <circle cx="96" cy="286" r="13" fill="#4f46e5" fill-opacity="0.18"/>
    <circle cx="96" cy="286" r="8" fill="#4f46e5"/>
    <circle cx="96" cy="286" r="3" fill="#ffffff"/>
  </g>
  <!-- destination pin -->
  <g>
    <path d="M540 60 c -13 0 -22 10 -22 22 c 0 15 22 34 22 34 c 0 0 22 -19 22 -34 c 0 -12 -9 -22 -22 -22 z" fill="#0e7490"/>
    <circle cx="540" cy="82" r="8" fill="#ffffff"/>
    <circle cx="540" cy="82" r="4" fill="#22d3ee"/>
  </g>

  <!-- caption -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#5a6172">
    <text x="34" y="332">dijkstra(campus) → shortest walk</text>
  </g>
</svg>
